name: Fetch News

on:
  workflow_dispatch:
  schedule:
    # Runs every hour. Later, you can replace the build step with a script or
    # API call that saves fetched feed data somewhere permanent.
    - cron: "0 * * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate the app build
        run: npm run build
